<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵批次碳排計算器 (全路線地圖版)</title>
    <link rel="stylesheet" href="libs/leaflet.css">
    <script src="libs/leaflet.js"></script>
    <link rel="stylesheet" href="style.css"> <!-- 引入外部 CSS -->
</head>

<body>

<div class="main-wrapper">
    <div class="left-panel">
        <h2>台鐵碳排批次規劃表</h2>
        <button class="btn-action btn-add" onclick="addNewRow()">＋ 新增一筆行程</button>
        <div class="table-responsive">
            <table class="excel-table">
                <thead>
                    <tr>
                        <th style="width: 40px; text-align: center;">圖軸</th>
                        <th style="width: 130px;">起點站</th>
                        <th style="width: 130px;">終點站</th>
                        <th style="width: 65px;">人數</th>
                        <th style="width: 80px;">里程(km)</th>
                        <th style="width: 80px;">碳排(kg)</th>
                        <th style="width: 50px;">操作</th>
                    </tr>
                </thead>
                <tbody id="excelBody"></tbody>
            </table>
        </div>
        <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="importCSV(this)">
        <button class="btn-action btn-add" style="background:#6366f1;" onclick="document.getElementById('csvFile').click()">📂 匯入 CSV 批次清單</button>
        <button class="btn-calc" onclick="calculateAllRoutes()">一鍵批次計算全部行程</button>
        <div id="summaryResult" class="summary-box">
            <p><b>📊 批次計算總計結果</b></p>
            <p>行程總筆數：<span id="totalCount" class="highlight">0</span> 筆</p>
            <p>合計總里程：<span id="totalDistance" class="highlight">0.0</span> 公里</p>
            <p>合計總碳排放：<span id="totalCarbon" class="highlight">0.000</span> 公斤 CO<sub>2</sub>e</p>
            <div id="pathInfoBox" class="path-info">
                <strong>📍 目前聚焦列詳細路徑：</strong><br>
                <span id="activePathText" style="color:#1d4ed8; font-weight:bold;"></span>
            </div>
        </div>
    </div>
    <div class="right-map-panel">
        <div id="map"></div>
    </div>
</div>
<script src="main.js"></script> <!-- 引入外部 JS -->
</body>
</html>
