<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台鐵批次碳排計算器 (全路線地圖版)</title>
    <!-- 引入 Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <!-- 引入外部 CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-wrapper">
    <div class="left-panel">
        <h2>台鐵碳排批次規劃表</h2>
        <button class="btn-action btn-add" onclick="addNewRow()">＋ 新增一筆行程</button>
        <button class="btn-action btn-calc" onclick="calculateAllRoutes()">🔄 重新計算</button>
        
        <!-- 新增：CSV 匯入按鈕與隱藏的 input -->
        <button class="btn-action btn-calc" style="background: #64748b;" onclick="document.getElementById('csvFileInput').click()">📥 匯入 CSV,xlsx,xls</button>
        <input type="file" id="csvFileInput" accept=".csv,.xlsx, .xls" style="display: none;" onchange="importCSV(this)">
        <button onclick="exportToExcel()" style="background-color: #2e7d32; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; margin-left: 5px;">📤 匯出結果 Excel</button>
        <div class="table-responsive">
            <table class="excel-table">
                <thead>
                    <tr>
                        <th style="width: 40px; text-align: center;">圖軸</th>
                        <th style="width: 130px;">起點站</th>
                        <th style="width: 130px;">終點站</th>
                        <th style="width: 65px;">人數</th>
                        <th style="width: 80px;">里程(km)</th>
                        <th style="width: 80px;">碳排(kg)</th>
                        <th style="width: 50px;">操作</th>
                    </tr>
                </thead>
                <tbody id="excelBody"></tbody>
            </table>
        </div> <!-- table-responsive 結束 -->

        <!-- 修正：補上 left-panel 遺漏的閉合 div 標籤，使結構正確 -->
        <div id="summaryResult" class="summary-box" style="display: none;">
            <p>共 <span id="totalCount">0</span> 筆行程</p>
            <p>總預計里程：<span id="totalDistance">0</span> km</p>
            <p>總碳排放量：<span id="totalCarbon">0</span> kg CO2e</p>
        </div>
        
        <div id="pathInfoBox" class="info-box" style="display: none;">
            <h4>當前路線詳情</h4>
            <p id="activePathText">-</p>
        </div>
    </div> <!-- left-panel 結束 -->

    <div class="right-panel">
        <div id="map"></div>
    </div>
</div>

<!-- 引入 Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- 引入 main.js -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="main.js"></script>

</body>
</html>
