<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Rail Graph System</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>🚆 台鐵 Graph 路線系統</h2>

<div id="map"></div>

<table>
    <thead>
        <tr>
            <th>起點</th>
            <th>終點</th>
            <th>人數</th>
            <th>操作</th>
            <th>距離</th>
            <th>碳排</th>
        </tr>
    </thead>
    <tbody id="excelBody"></tbody>
</table>

<button onclick="addRow()">＋新增路線</button>
<button onclick="calculateAll()">計算全部</button>

<h3>📊 統計</h3>
<div>
    行程數：<span id="totalCount">0</span><br>
    總距離：<span id="totalDistance">0</span><br>
    碳排：<span id="totalCarbon">0</span>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="main.js"></script>

</body>
</html>
